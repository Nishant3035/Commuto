<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Commuto - Share rides. Save money. Go green. The smart ride-sharing platform for students.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1D4ED8">

  <!-- Prevent stale cache on reload -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Commuto">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Commuto</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect to Google Fonts for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Maps JavaScript API — loaded early in head with places library -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCVpIx5LWUzmA8MKu12S1jwwi_RG5MaLjw&libraries=places&callback=Function.prototype" async defer></script>

  <style>
    /* ===== Premium Loading Screen ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    .loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Animated background orbs */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: float 6s ease-in-out infinite;
    }
    .bg-orb-1 {
      width: 300px; height: 300px;
      background: #2563EB;
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .bg-orb-2 {
      width: 250px; height: 250px;
      background: #10B981;
      bottom: -80px; right: -80px;
      animation-delay: -3s;
    }
    .bg-orb-3 {
      width: 200px; height: 200px;
      background: #7C3AED;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -1.5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    .logo-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: logo-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes logo-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      object-fit: contain;
      margin-bottom: 24px;
      box-shadow: 0 20px 60px rgba(37, 99, 235, 0.4);
    }

    .brand-name {
      font-size: 32px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .brand-tagline {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Progress bar */
    .progress-container {
      position: relative;
      z-index: 1;
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-top: 48px;
      overflow: hidden;
      animation: logo-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      opacity: 0;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563EB, #10B981);
      border-radius: 4px;
      animation: progress 2.5s ease-in-out forwards;
    }

    @keyframes progress {
      0% { width: 0%; }
      30% { width: 40%; }
      60% { width: 70%; }
      90% { width: 85%; }
      100% { width: 95%; }
    }
  </style>
</head>
<body>
  <!-- Premium Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="logo-container">
      <img src="icons/Icon-192.png" alt="Commuto" class="logo-icon">
      <div class="brand-name">Commuto</div>
      <div class="brand-tagline">Share rides. Save money. Go green.</div>
    </div>

    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Hide loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-screen');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function() { loader.remove(); }, 600);
      }
    });

    // Fallback: if Flutter hasn't loaded after 15s, try reloading once
    setTimeout(function() {
      var loader = document.getElementById('loading-screen');
      if (loader && !loader.classList.contains('fade-out')) {
        // Only auto-reload once to prevent infinite loop
        var reloaded = sessionStorage.getItem('commuto_reloaded');
        if (!reloaded) {
          sessionStorage.setItem('commuto_reloaded', 'true');
          location.reload();
        } else {
          // Show a friendly error
          var tagline = document.querySelector('.brand-tagline');
          if (tagline) {
            tagline.textContent = 'Taking longer than usual... Please refresh the page.';
            tagline.style.color = 'rgba(255,255,255,0.8)';
          }
        }
      } else {
        // Clear the reload flag on successful load
        sessionStorage.removeItem('commuto_reloaded');
      }
    }, 15000);
  </script>
</body>
</html>
